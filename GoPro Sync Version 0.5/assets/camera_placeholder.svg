<svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b2f3c"/>
      <stop offset="1" stop-color="#181b24"/>
    </linearGradient>
    <radialGradient id="lensGrad" cx="0.35" cy="0.35" r="0.75">
      <stop offset="0" stop-color="#5fe6ff"/>
      <stop offset="0.45" stop-color="#00c2ff"/>
      <stop offset="1" stop-color="#005f7d"/>
    </radialGradient>
  </defs>

  <!-- Gehäuse -->
  <rect x="55" y="70" width="210" height="170" rx="26" fill="url(#bodyGrad)" stroke="#3a3f4f" stroke-width="2"/>

  <!-- Halterungs-Lasche oben -->
  <rect x="130" y="46" width="60" height="30" rx="8" fill="#20232e" stroke="#3a3f4f" stroke-width="2"/>

  <!-- Status-LED -->
  <circle cx="235" cy="95" r="6" fill="#3ddc84"/>

  <!-- Kleines Display -->
  <rect x="75" y="88" width="46" height="30" rx="6" fill="#0d0f14" stroke="#3a3f4f" stroke-width="1.5"/>
  <text x="98" y="107" font-family="Segoe UI, sans-serif" font-size="11" fill="#00c2ff" text-anchor="middle">REC</text>

  <!-- Objektiv außen -->
  <circle cx="160" cy="165" r="62" fill="#0d0f14" stroke="#3a3f4f" stroke-width="4"/>
  <!-- Objektiv Ring -->
  <circle cx="160" cy="165" r="50" fill="url(#lensGrad)"/>
  <circle cx="160" cy="165" r="28" fill="#06121a"/>
  <circle cx="145" cy="150" r="9" fill="#ffffff" opacity="0.55"/>

  <!-- Seitentaste -->
  <rect x="46" y="150" width="10" height="34" rx="4" fill="#3a3f4f"/>

  <!-- Modus-Taste unten -->
  <circle cx="235" cy="225" r="14" fill="#20232e" stroke="#00c2ff" stroke-width="2.5"/>
</svg>
